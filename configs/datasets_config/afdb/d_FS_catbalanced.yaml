# AFDB d_FS CAT-balanced dataset config (Phase 2a).
# Mirrors afdb/d_FS.yaml (AFDB folder dataset; no dataselector -> database_tag="afdb")
# plus the CAT-balanced sampling layer, TED fold labels, and ConFind contacts.
#
# Seq-sim cluster layer: cluster_seqid_0.25_d_FS.tsv (gen_afdb_clusters.py;
#   828,843 clusters / 1,050,461 chains @ mmseqs min-seq-id 0.25).
# chain_to_cat: afdb_chain_to_cat.pkl (1,175 CAT topologies; 10.21% of chains labeled;
#   736,135 of 828,843 clusters are no-CAT).
# No-CAT mix: nocat_bucket_draws=294 -> ~50:50 labeled:unlabeled per epoch at 4 GPUs
#   (4*294=1176 ~= 1175 labeled topologies). Retune if ngpus changes.
#
# LENGTH: AFDB has no length filter (min/max_length derive from a dataselector, which
# AFDB lacks). PaddingTransform max_size=256 TRUNCATES longer chains to their first 256
# residues (transforms.py:217). 256 matches PDB stage-1 tensor size for the eventual 2b
# combination. CAVEAT: cropping a long multi-domain chain can drop the domain carrying
# the sampled CAT (whole-chain sampling per OPEN DECISION 3).
datamodule:
  _target_: "proteinfoundation.datasets.pdb_data.PDBLightningDataModule"
  data_dir: ${oc.env:DATA_PATH}/d_FS/
  in_memory: False  # 1.05M chains won't fit in RAM; CAT-balanced touches ~1176/epoch -> per-batch disk read
  format: "pdb"
  overwrite: False
  regenerate_missing: False  # read-only over already-processed d_FS; 2 of 1.05M .pt are unregenerable (raw parse fails)
  cath_code_dir: ${oc.env:DATA_PATH}/cath_shared/
  multilabel_mode: "sample"
  cath_dedupe_codes: True
  batch_padding: True
  sampling_mode: "cath-balanced"
  chain_to_cat_path: ${oc.env:DATA_PATH}/d_FS/afdb_chain_to_cat.pkl
  cat_cluster_draw: "largest"
  cath_balanced_member_mode: "cluster-random"
  nocat_bucket: True
  nocat_bucket_draws: 294
  transforms:
    - _target_: "proteinfoundation.datasets.transforms.GlobalRotationTransform"
    - _target_: "proteinfoundation.datasets.transforms.ChainBreakPerResidueTransform"
    - _target_: "proteinfoundation.datasets.transforms.TEDLabelTransform"
      file_path: ${oc.env:DATA_PATH}/d_FS/ted_365m.domain_summary.cath.globularity.taxid.tsv
      pkl_path: ${oc.env:DATA_PATH}/d_FS/afdb_to_cath_ted.pkl
    - _target_: "proteinfoundation.datasets.transforms.CATHToIndicesTransform"
      cath_code_dir: ${oc.env:DATA_PATH}/cath_shared/
    - _target_: "proteinfoundation.datasets.transforms.DSSPTargetTransform"
    - _target_: "proteinfoundation.datasets.transforms.ContactMapTransform"
      contact_method: confind  # AFDB .pt carry precomputed contact_map_confind
      confind_rotamer_lib: ${oc.env:DATA_PATH}/rotlibs
      confind_contact_threshold: 0.01
    - _target_: "proteinfoundation.datasets.transforms.PaddingTransform"
      max_size: 256
  batch_size: 8
  num_workers: 8
  pin_memory: True
  prefetch_factor: 2

  datasplitter:
    _target_: "proteinfoundation.datasets.pdb_data.PDBDataSplitter"
    data_dir: ${oc.env:DATA_PATH}/d_FS/
    train_val_test: [0.98, 0.019, 0.001]
    split_type: "sequence_similarity"
    split_sequence_similarity: 0.25
    overwrite_sequence_clusters: False
    exclude_ids_from_file: ${oc.env:DATA_PATH}/d_FS/exclude_bad_afdb.txt
