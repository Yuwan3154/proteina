# Same combined PDB+AFDB CAT-balanced dataset as pdb_dFS_combined_catbalanced_extlig.yaml,
# except nocat_bucket_inverse_freq_ratio: 3.0 (2026-07-07 user directive) -- triples the
# no-CAT draw count per epoch relative to the CAT-labeled side (3:1 instead of 1:1), still
# via the same checkpoint-persisted inverse-frequency-weighted mechanism (weight=1/(count+1)).
# Motivation: coverage analysis of the just-finished 1:1 run showed 42.1% of the 720,756
# no-CAT train clusters were NEVER sampled even once over the whole run (draw budget <
# population size) -- tripling the draw count directly increases the budget.
datamodule:
  _target_: "proteinfoundation.datasets.pdb_data.PDBLightningDataModule"
  data_dir: ${oc.env:DATA_PATH}/pdb_dFS_combined/
  in_memory: False
  format: "pdb"
  overwrite: False
  regenerate_missing: False
  cath_code_dir: ${oc.env:DATA_PATH}/cath_shared/
  multilabel_mode: "sample"
  cath_dedupe_codes: True
  batch_padding: True
  sampling_mode: "cath-balanced"
  chain_to_cat_path: ${oc.env:DATA_PATH}/pdb_dFS_combined/combined_chain_to_cat.pkl
  cat_cluster_draw: "largest"
  cath_balanced_member_mode: "cluster-random"
  nocat_bucket: True
  nocat_bucket_full_coverage: False
  nocat_bucket_inverse_freq: True
  nocat_bucket_inverse_freq_ratio: 3.0
  transforms:
    - _target_: "proteinfoundation.datasets.transforms.GlobalRotationTransform"
    - _target_: "proteinfoundation.datasets.transforms.ChainBreakPerResidueTransform"
    - _target_: "proteinfoundation.datasets.transforms.CATHLabelTransform"
      root_dir: ${oc.env:DATA_PATH}/cathdata/
    - _target_: "proteinfoundation.datasets.transforms.TEDLabelTransform"
      file_path: ${oc.env:DATA_PATH}/d_FS/ted_365m.domain_summary.cath.globularity.taxid.tsv
      pkl_path: ${oc.env:DATA_PATH}/d_FS/afdb_to_cath_ted.pkl
    - _target_: "proteinfoundation.datasets.transforms.CATHToIndicesTransform"
      cath_code_dir: ${oc.env:DATA_PATH}/cath_shared/
    - _target_: "proteinfoundation.datasets.transforms.DSSPTargetTransform"
    - _target_: "proteinfoundation.datasets.transforms.PurgeConfindTransform"
    - _target_: "proteinfoundation.datasets.transforms.PaddingTransform"
      max_size: 256
  batch_size: 8
  num_workers: 8
  pin_memory: True
  prefetch_factor: 2

  datasplitter:
    _target_: "proteinfoundation.datasets.pdb_data.PDBDataSplitter"
    data_dir: ${oc.env:DATA_PATH}/pdb_dFS_combined/
    train_val_test: [0.98, 0.019, 0.001]
    split_type: "sequence_similarity"
    split_sequence_similarity: 0.25
    overwrite_sequence_clusters: False
