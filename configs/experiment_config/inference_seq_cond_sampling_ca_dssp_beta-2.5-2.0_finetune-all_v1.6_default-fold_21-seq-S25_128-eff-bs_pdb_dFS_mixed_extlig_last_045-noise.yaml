# Inference config: seq-conditioned sampling for mixed PDB+d_FS ext_lig model.
# Checkpoint from training_ca_dssp_beta-2.5-2.0_finetune-all_v1.6_default-fold_21-seq-S25_128-eff-bs_pdb_dFS_mixed_extlig_warmup_cutoff-190828.
# ext_lig_default: "unknown" for unconditional-style generation; "absent" for apo/ligand-free.

defaults:
  - inference_base
  - _self_

run_name_: seq_cond_pdb_dFS_mixed_extlig
ckpt_name: ca_dssp_beta-2.5-2.0_finetune-all_v1.6_default-fold_21-seq-S25_128-eff-bs_pdb_dFS_mixed_extlig_warmup_cutoff-190828_last.ckpt

self_cond: True
fold_cond: False
cath_code_level: "T"
seq_cond: True

# Data: use d_FS for AFDB sequences or pdb_train for PDB sequences.
# cath_code_file: CSV with "cath_code" column (one per row). For d_FS, export train split
#   after first run: dfs_splits["train"].to_csv("cath_codes_train_d_FS.csv") or use existing PDB file.
data_dir: ${oc.env:DATA_PATH}/d_FS/
cath_code_file: cath_codes_train_df_d_FS.csv  # Create from train split or use pdb_train/cath_codes_train_df_pdb_*.csv for PDB seqs

# ext_lig inference default: "unknown" (default) or "absent"
ext_lig_default: "unknown"

# Sampling
dt: 0.005
nsamples_per_len: 256
max_nsamples: 4

lora:
  use: False
  lora_alpha: 32.0
  lora_dropout: 0.0
  r: 0
  train_bias: "none"

sampling_caflow:
  sampling_mode: sc
  sc_scale_noise: 0.45

compute_designability: False
compute_fid: False
