name: contact_af3_xM_tri_individual-embed_coor_ipa-coord

# Architecture parameters
token_dim: 128
ipa_token_dim: 384
nlayers: 16
nheads: 4
ipa_nheads: 12
residual_mha: True
residual_transition: True
parallel_mha_transition: False
use_attn_pair_bias: True

strict_feats: False
feature_embedding_mode: "individual"  # project each feature individually to dim_out and sum (vs concat + shared Linear)

# Sequence features. dssp_sc = DSSP self-conditioning, seeds the initial single rep
# (like x_sc in coordinate mode). No x_sc (coordinate SC) in contact-map mode.
# Available features documented in ca_af3_50M_tri.yaml
feats_init_seq: ["res_seq_pdb_idx", "chain_break_per_res", "dssp_sc"]
feats_cond_seq: ["time_emb", "fold_emb"]

# Feature extraction parameters
t_emb_dim: 256
dim_cond: 256
idx_emb_dim: 128
fold_emb_dim: 128
cath_code_dir: ${oc.env:DATA_PATH}/pdb_raw/
multilabel_mode: "sample"

# Pair features. contact_map_t (noised input) is embedded directly in protein_transformer.py;
# contact_map_sc = contact-map self-conditioning (pass-through pair feature).
# Available features documented in ca_af3_50M_tri.yaml
feats_pair_repr: ["rel_seq_sep", "contact_map_sc"]
feats_pair_cond: ["time_emb"]

# Pair feature params (reuse defaults where applicable)
xt_pair_dist_dim: 64
xt_pair_dist_min: 0.1
xt_pair_dist_max: 3
x_sc_pair_dist_dim: 128
x_sc_pair_dist_min: 0.1
x_sc_pair_dist_max: 3
x_motif_pair_dist_dim: 128
x_motif_pair_dist_min: 0.1
x_motif_pair_dist_max: 3
seq_sep_dim: 127
pair_repr_dim: 384
ipa_pair_repr_dim: 128

update_pair_repr: True
update_pair_repr_every_n: 1
use_tri_mult: True
tri_mult_c: 384

num_registers: 10
use_qkln: True

num_buckets_predict_pair: 39  # 38 bins between 3.25Å-50.75Å + 1 overflow (AlphaFold format)

# Contact map diffusion mode
contact_map_mode: True
predict_coords: "ipa"  # Whether to predict coordinates (for FAPE loss, logging)
