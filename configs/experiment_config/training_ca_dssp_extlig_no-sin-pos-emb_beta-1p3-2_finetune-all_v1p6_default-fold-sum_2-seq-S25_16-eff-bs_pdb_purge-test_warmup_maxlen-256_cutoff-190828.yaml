run_name_: ca_dssp_extlig_no-sin-pos-emb_beta-1p3-2_finetune-all_v1p6_default-fold-sum_2-seq-S25_16-eff-bs_pdb_purge-test_warmup_maxlen-256_cutoff-190828
pretrain_ckpt_path: ~/proteina/data/weights/proteina_v1.6_DFS_200M_notri_long_chain_generation.ckpt

hardware:
  ncpus_per_task_train_: 16
  ncpus_per_task_prepro_: 16
  accelerator: gpu
  ngpus_per_node_: 1
  nnodes_: 1

loss:
  t_distribution:
    name: mix_up02_beta
    p1: 1.3
    p2: 2.0
  loss_t_clamp: 0.9
  use_aux_loss: True
  aux_loss_t_lim: 0.3
  thres_aux_2d_loss: 0.6
  aux_loss_weight: 1.0
  dssp_aux_loss_weight: 1.0
  num_dist_buckets: 64
  max_dist_boundary: 1.0

defaults:
  - model: caflow
  - override model/nn: ca_af3_200M_no_tri
  - _self_

model:
  nn:
    multilabel_mode: "sum"
    # CATH lists each structural domain as a separate entry (e.g., 1n7d_A has
    # 5 LDL-receptor type-A domains all classified as 4.10.400.10). With
    # cath_dedupe_codes: True we collapse repeated (C, A, T) triples per chain
    # so each unique fold contributes once to the sum (= "which folds are
    # present" semantics). Set False to keep CATH's per-domain listing and
    # weight folds by domain-instance count.
    cath_dedupe_codes: True
    residue_type_emb_init_seq: True
    residue_type_emb_cond_seq: True
    residue_type_emb_init_pair: True
    residue_type_emb_cond_pair: True
    seq_emb_dim: 2
    predict_dssp: true
    ext_lig_emb_init_seq: True
    ext_lig_emb_cond_seq: True
    ext_lig_emb_dim: 3

# Dataset: PDB only (purge-test, no mixed d_FS)
dataset: pdb_train_S25_max256_purge-test_cutoff-190828
dataset_config_subdir: pdb

force_precision_f32: False

training:
  self_cond: True
  seq_cond: True
  fold_cond: True
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.67, 0.13, 0.2, 0.0] # Pretain: [0.5, 0.1, 0.15, 0.25], Finetune (no H, scale up by 4/3): [0.67, 0.13, 0.2, 0.0]
  mask_seq_proportion: 0.15
  mask_extlig_proportion: 0.3
  finetune_seq_cond_lora_only: False
  self_cond_use_copy: True
  self_cond_copy_update_every: 10
  zero_sin_pos_emb: True

lora:
  use: False
  lora_alpha: 32.0
  lora_dropout: 0.0
  r: 0
  train_bias: "none"

opt:
  lr: 0.0001
  max_epochs: 100
  batch_size: 8
  accumulate_grad_batches: 2
  val_check_interval_optim_steps: 1000  # counted in optim steps
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  dist_backend: gloo
  use_lr_warmup: True
  warmup_steps: 3000
  warmup_start_lr_ratio: 0.0
  lr_scheduler_type: "cosine"
  use_cueq: False

log:
  wandb_project: protein_transformer_big_runs
  log_wandb: True
  log_every_n_steps: 1
  log_structure_every_n_steps: 50
  checkpoint: True
  last_ckpt_every_n_steps: 200

validation_sampling:
  dt: 0.005
  sampling_mode: sc
  sc_scale_noise: 0.45
  # NOTE: tmscore_n_samples counts BATCHES (not samples). 8 batches of val_batch_size
  # = 8 samples each → 64 samples in the concatenated val trajectory. Each chunk then
  # runs at training-batch memory (see tmscore_traj_chunk_size).
  tmscore_n_samples: 8
  tmscore_every_n_val_epochs: 1
  tmscore_mode: 5
  # Cap the per-trajectory NN forward at training-batch memory. Defaults to
  # opt.batch_size when omitted. With tmscore_n_samples=8 and batch_size=8, this
  # turns one OOMing B=64 trajectory call into 8 successive B=8 calls.
  tmscore_traj_chunk_size: 8
  # Prediction-eval semantics: use each val sample's real length (from its own mask),
  # not a random L drawn from dataselector bounds. Default would auto-enable when
  # dataselector exposes min/max length, which is wrong for prediction eval — and
  # changing L per val epoch also triggers torch._dynamo recompiles.
  variable_length_sampling: False

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False
