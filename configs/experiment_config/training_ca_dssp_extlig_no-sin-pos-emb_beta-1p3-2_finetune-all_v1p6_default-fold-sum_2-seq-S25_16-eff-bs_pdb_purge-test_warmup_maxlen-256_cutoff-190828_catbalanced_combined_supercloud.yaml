run_name_: ca_dssp_extlig_no-sin-pos-emb_beta-1p3-2_finetune-all_v1p6_default-fold-sum_2-seq-S25_16-eff-bs_pdb_purge-test_warmup_maxlen-256_cutoff-190828_catbalanced_combined_supercloud
# SuperCloud port of the Engaging ext_lig finetune (see the sibling _catbalanced_nocat_full_cont
# config), continuing from the SAME base checkpoint (step 123200) but on the combined PDB+AFDB
# CAT-balanced dataset instead of PDB-only, across 4 nodes x 2 V100 (xeon-g6-volta). last.ckpt /
# last-EMA.ckpt already staged in this run's store/checkpoints/ (copied from the original
# ext_lig run's pristine checkpoint on SuperCloud, not the Engaging smoke-test-advanced one).
# pretrain_ckpt_path is ignored once last.ckpt exists (train.py only consumes it when no last.ckpt
# is found) -- kept for reference only.
pretrain_ckpt_path: ~/proteina/data/weights/proteina_v1.6_DFS_200M_notri_long_chain_generation.ckpt

hardware:
  ncpus_per_task_train_: 16
  ncpus_per_task_prepro_: 16
  accelerator: gpu
  ngpus_per_node_: 2
  nnodes_: 4

loss:
  t_distribution:
    name: mix_up02_beta
    p1: 1.3
    p2: 2.0
  loss_t_clamp: 0.9
  use_aux_loss: True
  aux_loss_t_lim: 0.3
  thres_aux_2d_loss: 0.6
  aux_loss_weight: 1.0
  dssp_aux_loss_weight: 1.0
  num_dist_buckets: 64
  max_dist_boundary: 1.0

defaults:
  - model: caflow
  - override model/nn: ca_af3_200M_no_tri
  - _self_

model:
  nn:
    multilabel_mode: "sum"
    cath_dedupe_codes: True
    residue_type_emb_init_seq: True
    residue_type_emb_cond_seq: True
    residue_type_emb_init_pair: True
    residue_type_emb_cond_pair: True
    seq_emb_dim: 2
    predict_dssp: true
    ext_lig_emb_init_seq: True
    ext_lig_emb_cond_seq: True
    ext_lig_emb_dim: 3

# Dataset: combined PDB+AFDB, cath-balanced sampling w/ checkpoint-persisted inverse-frequency
# no-CAT sampling (see configs/datasets_config/mixed/pdb_dFS_combined_catbalanced_extlig.yaml).
dataset: pdb_dFS_combined_catbalanced_extlig
dataset_config_subdir: mixed

# V100 (Volta, sm_70) has no native bf16 tensor cores -- force fp32 per explicit user direction
# (avoid fp16 too; suspected unstable even for fine-tuning, only a last resort).
force_precision_f32: True

# Packed-mmap in-RAM combined.pack (505GiB, transferred from Engaging) -- env-gated, null/no-op
# when PACK_PATH unset. See this run's launcher sbatch for the export.
datamodule:
  pack_path: ${oc.env:PACK_PATH,null}

training:
  self_cond: True
  seq_cond: True
  fold_cond: True
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.67, 0.13, 0.2, 0.0]
  mask_seq_proportion: 0.15
  mask_extlig_proportion: 0.3  # inert while ext_lig_smart_unknown_augment=True below (documented fallback value)
  ext_lig_smart_unknown_augment: True
  ext_lig_frac_present_stats_path: ${oc.env:DATA_PATH}/ext_lig_stats/frac_present.npy
  ext_lig_runlen_stats_path: ${oc.env:DATA_PATH}/ext_lig_stats/runlen_buckets.npz
  finetune_seq_cond_lora_only: False
  self_cond_use_copy: True
  self_cond_copy_update_every: 10
  zero_sin_pos_emb: True

lora:
  use: False
  lora_alpha: 32.0
  lora_dropout: 0.0
  r: 0
  train_bias: "none"

opt:
  lr: 0.0001
  max_epochs: 100000  # non-binding; max_steps below is the real hard stop
  # 200 additional epochs (user's standing duration target), recomputed with the corrected
  # per-rank epoch length for THIS dataset/sampler/hardware: 1282 CAT topologies (train split,
  # confirmed live via the smoke test's sampler construction log) + 1282 no-CAT draws (now
  # 1:1 by the inverse-freq mode) = 2564 total/epoch, split across 8 ranks (4 nodes x 2 V100):
  # ceil(1282/8)=161 CAT + ceil(1282/8)=161 no-CAT = 322 steps/epoch/rank. 200 epochs x 322 =
  # 64400 additional steps. Target = checkpoint step 123200 + 64400 = 187600.
  max_steps: 187600
  lr_horizon_from_max_steps: True
  batch_size: 2  # confirmed safe (no OOM) on 32GB V100 + fp32 via the smoke test; not pushed higher (untested), fine per "training slower is fine"
  accumulate_grad_batches: 1  # 8 GPUs (4 nodes x 2) x batch 2 x accum 1 = eff batch 16, matching the original single-GPU run's effective batch size
  optimizer: muon
  val_check_interval_optim_steps: 1000
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  # gloo, not nccl: this is a NEW multi-node (not just multi-GPU) topology on different hardware/
  # interconnect than the already-nccl-tested Engaging single-node case -- start with the
  # known-safe backend, revisit nccl only after gloo is confirmed working end-to-end.
  dist_backend: gloo
  use_lr_warmup: True
  warmup_steps: 3000
  warmup_start_lr_ratio: 0.0
  lr_scheduler_type: "cosine"
  use_cueq: False

log:
  wandb_project: protein_transformer_big_runs
  log_wandb: True
  log_every_n_steps: 1
  log_structure_every_n_steps: 50
  checkpoint: True
  last_ckpt_every_n_steps: 200  # calibrated from the smoke test's measured ~2.6-2.9s/step -> ~200 steps = ~9min

validation_sampling:
  dt: 0.005
  sampling_mode: sc
  sc_scale_noise: 0.45
  tmscore_n_samples: 8
  tmscore_every_n_val_epochs: 1
  tmscore_mode: 5
  tmscore_traj_chunk_size: 8
  variable_length_sampling: False

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False
