run_name_: ca_dssp_extlig_no-sin-pos-emb_beta-1p3-2_finetune-all_v1p6_default-fold-sum_2-seq-S25_16-eff-bs_pdb_purge-test_warmup_maxlen-256_cutoff-190828_catbalanced_nocat_full_cont
# pretrain_ckpt_path is IGNORED once store/{run_name_}/checkpoints/last.ckpt exists (train.py only
# consumes it when no last.ckpt is found) -- kept unchanged from the base config for reference only.
# This run's checkpoints/ dir is seeded with the true last.ckpt (step 123200, epoch 199) fetched from
# SuperCloud, so training resumes full state (optimizer/EMA/scheduler/step) from there.
pretrain_ckpt_path: ~/proteina/data/weights/proteina_v1.6_DFS_200M_notri_long_chain_generation.ckpt

hardware:
  ncpus_per_task_train_: 16
  ncpus_per_task_prepro_: 16
  accelerator: gpu
  ngpus_per_node_: 2
  nnodes_: 1

loss:
  t_distribution:
    name: mix_up02_beta
    p1: 1.3
    p2: 2.0
  loss_t_clamp: 0.9
  use_aux_loss: True
  aux_loss_t_lim: 0.3
  thres_aux_2d_loss: 0.6
  aux_loss_weight: 1.0
  dssp_aux_loss_weight: 1.0
  num_dist_buckets: 64
  max_dist_boundary: 1.0

defaults:
  - model: caflow
  - override model/nn: ca_af3_200M_no_tri
  - _self_

model:
  nn:
    multilabel_mode: "sum"
    cath_dedupe_codes: True
    residue_type_emb_init_seq: True
    residue_type_emb_cond_seq: True
    residue_type_emb_init_pair: True
    residue_type_emb_cond_pair: True
    seq_emb_dim: 2
    predict_dssp: true
    ext_lig_emb_init_seq: True
    ext_lig_emb_cond_seq: True
    ext_lig_emb_dim: 3

# Dataset: PDB only, cath-balanced sampling w/ full no-CAT-cluster coverage (was cluster-random)
dataset: pdb_train_S25_max256_purge-test_cutoff-190828_catbalanced
dataset_config_subdir: pdb

force_precision_f32: False

training:
  self_cond: True
  seq_cond: True
  fold_cond: True
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.67, 0.13, 0.2, 0.0] # Pretain: [0.5, 0.1, 0.15, 0.25], Finetune (no H, scale up by 4/3): [0.67, 0.13, 0.2, 0.0]
  mask_seq_proportion: 0.15
  mask_extlig_proportion: 0.3  # inert while ext_lig_smart_unknown_augment=True below (kept as the documented fallback value)
  ext_lig_smart_unknown_augment: True  # block-shaped, per-chain-diverse-fraction augmentation (real empirical stats), replaces the fixed-0.3 i.i.d. scatter above
  ext_lig_frac_present_stats_path: ${oc.env:DATA_PATH}/ext_lig_stats/frac_present.npy
  ext_lig_runlen_stats_path: ${oc.env:DATA_PATH}/ext_lig_stats/runlen_buckets.npz
  finetune_seq_cond_lora_only: False
  self_cond_use_copy: True
  self_cond_copy_update_every: 10
  zero_sin_pos_emb: True

lora:
  use: False
  lora_alpha: 32.0
  lora_dropout: 0.0
  r: 0
  train_bias: "none"

opt:
  lr: 0.0001
  max_epochs: 100000  # non-binding; max_steps below is the real hard stop (same pattern as the 48M project's LR-horizon fix)
  max_steps: 164800  # 123200 (checkpoint's global_step) + 41600 (200 additional epochs x 208 steps/epoch under the NEW cath-balanced+full-nocat sampler, per-rank sampler len 1660 = ceil(861 topologies/2 gpus) + ceil(2458 no-cat clusters/2 gpus), batch_size 8, accum 1) -- user-specified "200 additional epochs with the new dataset" (2026-07-02)
  lr_horizon_from_max_steps: True  # pin the cosine anneal horizon to max_steps -- the ORIGINAL 200-epoch schedule already fully annealed by step 123200 (epoch 199/200); without this, configure_optimizers would re-derive total_steps from the NEW (much shorter) dataloader length and silently produce a different LR curve
  batch_size: 8
  accumulate_grad_batches: 1  # 2 GPUs x batch 8 x accum 1 = eff batch 16, same as the original 1 GPU x batch 8 x accum 2
  optimizer: muon
  val_check_interval_optim_steps: 1000  # counted in optim steps
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  dist_backend: nccl  # TESTING 2026-07-03: was gloo (slower, host-memory-routed all-reduce); trying nccl for real DDP throughput on 2x L40S, per user direction. User has seen NCCL hang indefinitely before -- watch closely, revert to gloo if unresolved after 3 well-diagnosed attempts.
  use_lr_warmup: True
  warmup_steps: 3000
  warmup_start_lr_ratio: 0.0
  lr_scheduler_type: "cosine"
  use_cueq: False

log:
  wandb_project: protein_transformer_big_runs
  log_wandb: True
  log_every_n_steps: 1
  log_structure_every_n_steps: 50
  checkpoint: True
  last_ckpt_every_n_steps: 200  # calibrated from the 1-GPU smoke test (2026-07-02): 508 steps / 1063s = ~2.1 s/step -> 200 steps = ~7 min, safely under the 15-min mit_normal_gpu budget with margin. Matches the original single-GPU production run's own value (SuperCloud exp_config), not an arbitrary new number.

validation_sampling:
  dt: 0.005
  sampling_mode: sc
  sc_scale_noise: 0.45
  tmscore_n_samples: 8
  tmscore_every_n_val_epochs: 1
  tmscore_mode: 5
  tmscore_traj_chunk_size: 8
  variable_length_sampling: False

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False
