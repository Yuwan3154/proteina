run_name_: ca_dssp_extlig_no-sin-pos-emb_beta-1p3-2_finetune-all_v1p6_default-fold-sum_21-seq-S25_16-eff-bs_pdb_purge-test_warmup_maxlen-256_cutoff-190828_catbalanced_reassigned_3to1nocat_supercloud
# Round 3 of the ext_lig SuperCloud finetune (2026-07-16 user directive) -- fresh from the
# original v1.6 pretrain checkpoint, same as round 2, but now on the foldseek structural-
# clustering "third option" per-member-reassigned dataset (see
# pdb_dFS_combined_catbalanced_extlig_reassigned_3to1nocat.yaml for the full data-recipe
# writeup) instead of round 2's plain sequence-similarity-only clustering. Everything else
# (seq_emb_dim 21, 1000 total epochs / 3:1 no-CAT:CAT ratio, hardware, loss, ext_lig features)
# is UNCHANGED from round 2 -- this is a data-recipe-only swap, isolating that as the single
# variable versus round 2's (paused, never-resumed) trajectory.
# NO last.ckpt should exist in this run's store/checkpoints/ dir -- that's what makes train.py
# take the pretrain_ckpt_path branch (see train.py:690, "if last_ckpt_path is None").
pretrain_ckpt_path: ~/proteina/data/weights/proteina_v1.6_DFS_200M_notri_long_chain_generation.ckpt

hardware:
  ncpus_per_task_train_: 16
  ncpus_per_task_prepro_: 16
  accelerator: gpu
  ngpus_per_node_: 2
  nnodes_: 4

loss:
  t_distribution:
    name: mix_up02_beta
    p1: 1.3
    p2: 2.0
  loss_t_clamp: 0.9
  use_aux_loss: True
  aux_loss_t_lim: 0.3
  thres_aux_2d_loss: 0.6
  aux_loss_weight: 1.0
  dssp_aux_loss_weight: 1.0
  num_dist_buckets: 64
  max_dist_boundary: 1.0

defaults:
  - model: caflow
  - override model/nn: ca_af3_200M_no_tri
  - _self_

model:
  nn:
    multilabel_mode: "sum"
    cath_dedupe_codes: True
    residue_type_emb_init_seq: True
    residue_type_emb_cond_seq: True
    residue_type_emb_init_pair: True
    residue_type_emb_cond_pair: True
    seq_emb_dim: 21  # unchanged from round 2 -- resizes an existing weight, cold-started via
                      # train.py's shape-tolerant loader (everything else warm-starts)
    predict_dssp: true
    ext_lig_emb_init_seq: True
    ext_lig_emb_cond_seq: True
    ext_lig_emb_dim: 3

# Dataset: NEW -- foldseek-reassigned clustering + CAT-cluster-level/member-level tracking,
# still nocat_bucket_inverse_freq_ratio=3.0 (see
# configs/datasets_config/mixed/pdb_dFS_combined_catbalanced_extlig_reassigned_3to1nocat.yaml).
dataset: pdb_dFS_combined_catbalanced_extlig_reassigned_3to1nocat
dataset_config_subdir: mixed

# V100 (Volta, sm_70) has no native bf16 tensor cores -- force fp32 per explicit user direction
# (avoid fp16 too; suspected unstable even for fine-tuning, only a last resort).
force_precision_f32: True

# Packed-mmap in-RAM combined.pack (505GiB, transferred from Engaging) -- env-gated, null/no-op
# when PACK_PATH unset. See this run's launcher sbatch for the export.
datamodule:
  pack_path: ${oc.env:PACK_PATH,null}

training:
  self_cond: True
  seq_cond: True
  fold_cond: True
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.67, 0.13, 0.2, 0.0]
  mask_seq_proportion: 0.15
  mask_extlig_proportion: 0.3  # inert while ext_lig_smart_unknown_augment=True below (documented fallback value)
  ext_lig_smart_unknown_augment: True
  ext_lig_frac_present_stats_path: ${oc.env:DATA_PATH}/ext_lig_stats/frac_present.npy
  ext_lig_runlen_stats_path: ${oc.env:DATA_PATH}/ext_lig_stats/runlen_buckets.npz
  finetune_seq_cond_lora_only: False
  self_cond_use_copy: True
  self_cond_copy_update_every: 10
  zero_sin_pos_emb: True

lora:
  use: False
  lora_alpha: 32.0
  lora_dropout: 0.0
  r: 0
  train_bias: "none"

opt:
  lr: 0.0001
  max_epochs: 100000  # non-binding; max_steps below is the real hard stop
  # 1000 TOTAL epochs, unchanged from round 2 (fresh start from step 0). Per-rank epoch length
  # is driven by CAT-topology-count x ratio, NOT by no-CAT population size, so it is UNAFFECTED
  # by the reassignment shrinking the no-CAT population 720,756->656,933: 1282 CAT topologies
  # -> ceil(1282/8)=161 CAT/rank. no-CAT draws = 3*1282=3846 -> ceil(3846/8)=481 no-CAT/rank.
  # Total = 161+481 = 642 steps/epoch/rank (same as round 2). 1000 epochs x 642 = 642,000 steps.
  max_steps: 642000
  lr_horizon_from_max_steps: True
  batch_size: 2  # unchanged from round 2 -- confirmed safe (no OOM) on 32GB V100 + fp32
  accumulate_grad_batches: 1  # 8 GPUs (4 nodes x 2) x batch 2 x accum 1 = eff batch 16, matching round 2
  optimizer: muon
  val_check_interval_optim_steps: 1000
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  dist_backend: gloo  # proven working end-to-end in round 1/2 (incl. the real rank_zero_only fix); unchanged
  use_lr_warmup: True
  warmup_steps: 3000
  warmup_start_lr_ratio: 0.0
  lr_scheduler_type: "cosine"
  use_cueq: False

log:
  wandb_project: protein_transformer_big_runs
  log_wandb: True
  log_every_n_steps: 1
  log_structure_every_n_steps: 50
  checkpoint: True
  last_ckpt_every_n_steps: 200  # same cadence as round 1/2 (~9min at similar throughput)
  checkpoint_best_tmscore_median: True  # uses the real rank_zero_only fix from round 1, proven solid

validation_sampling:
  dt: 0.005
  sampling_mode: sc
  sc_scale_noise: 0.45
  tmscore_n_samples: 8
  tmscore_every_n_val_epochs: 1
  tmscore_mode: 5
  tmscore_traj_chunk_size: 8
  variable_length_sampling: False

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False
