run_name_: train_run_1gpu

hardware:
  ncpus_per_task_train_: 24  # Number of CPUs per task during training
  ncpus_per_task_prepro_: 32  # Number of CPUs used for data preprocessing run
  accelerator: gpu
  ngpus_per_node_: 1  # Number of GPUs per node
  nnodes_: 1  # Number of nodes

# Below, for t_distribution, options are
# - name: uniform. p2 is the maximum time that we can sample (<=1, p1 is ignored).
# - name: logit-normal (normal + sigmoid). p1 is the mean of the normal, p2 the std (>0).
# - name: beta. This is beta(p1, p2).
loss:
  t_distribution:
    name: mix_up02_beta
    p1: 1.9
    p2: 1.0
  loss_t_clamp: 0.9  # Used for loss stability in frameflow, 1. for no clamping
  use_aux_loss: True  # Whether to use auxiliary loss
  aux_loss_t_lim: 0.3  # Time limit to apply auxiliary loss
  thres_aux_2d_loss: 0.6  # This is nm not Å
  aux_loss_weight: 1.0
  num_dist_buckets: 64  # Number of buckets to discretize the pairwise distance
  max_dist_boundary: 1.0  # Given by nanometer

defaults:
  - model: caflow  # caflow or frameflow
  - _self_

# Dataset params
dataset: pdb_train
dataset_config_subdir: pdb

force_precision_f32: False  # If false will use bf16-mixed precision

training:
  self_cond: True
  fold_cond: False
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.5, 0.1, 0.15, 0.25]   # Training proportion for [None, C, CA, CAT]. If specified, will override mask_{C,A,T}_prob

opt:
  lr: 0.0001
  max_epochs: 10000000
  log_every_n_steps: 1  # For wandb
  # Structure and contact map logging during training
  log_structure_every_n_steps: 0  # 0 = disabled, >0 = log structure and contact map images every N steps
  accumulate_grad_batches: 1
  val_check_interval: 50  # Number of training steps after which we check validation loss
  skip_nan_grad: False  # Skip updates with nan gradient
  grad_and_weight_analysis: False  # Log some statistics of gradients and weights
  dist_strategy: ddp  # For multi GPU training, do not change

log:
  wandb_project: protein_transformer_big_runs  # Leave this so we can compare runs easily
  log_wandb: True  # whether to log to wandb
  checkpoint: True  # whether to store checkpoints
  checkpoint_every_n_steps: 10000  # How often we store a checkpoint, should be greater than val_check_interval above
  last_ckpt_every_n_steps: 3500  # How often do we update our last ckpt, needed for requeuing without losing progress

seed: 42

ema:
  decay: 0.999  # 0 means no EMA, so all the EMA machinery is unused and no EMA checkpoints are stored
  validate_original_weights: False  # Whether to run validation on regular or EMA weights
  every_n_steps: 1  # Frequency of EMA updates
  cpu_offload: False  # Whether to offload EMA weights to cpu


# ==============================================================================
# Inference Configuration Section
# Used when calling inference scripts (inference.py / motif_inference.py) directly
# with this unified config file.
# ==============================================================================
inference:
  # Mode for automatic checkpoint resolution.
  # Options:
  #   - 'best': Automatically resolve the best checkpoint (prioritizing TM-score)
  #             from `./store/<run_name_>/checkpoints/`
  #   - 'last': Automatically resolve the last checkpoint from the run checkpoints dir
  # This uses the top-level run_name_ automatically when 'ckpt_name' is omitted or set to null.
  checkpoint_mode: "best"

  ncpus_: 24
  seed: 5

  # Lengths to sample. Uses `nres_lens` if specified, otherwise arange(min_len, max_len+1, step)
  nres_lens: [50, 100, 150, 200, 250]
  min_len: null
  max_len: null
  step_len: null

  # Number of samples per protein length
  nsamples_per_len: 100

  # Maximum number of samples in each batch
  max_nsamples: 5

  # Sampling
  dt: 0.0025
  self_cond: False

  # Sampling params only for CAFlow
  sampling_caflow:
    sampling_mode: sc  # Options are: vf (plain flow matching) or sc (using score, where parameters below matter)
    sc_scale_noise: 0.4  # scale used to multiply noise if mode == sc
    sc_scale_score: 1.0  # scale used to multiply score if mode == sc, not implemented yet
    gt_mode: "1/t"  # us, tan, or 1/t
    gt_p: 1.0  # float
    gt_clamp_val: null  # 10.0 float or null

  schedule:
    schedule_mode: log
    schedule_p: 2.0

  # ext_lig inference default: fill value when ext_lig is not provided in the inference batch.
  # "unknown" (2) is appropriate for unconditional / AFDB-style generation.
  # "absent" (0) is appropriate when generating apo / ligand-free structures explicitly.
  ext_lig_default: "unknown"

  # Fold conditioning
  fold_cond: False   # If true, turn on fold conditioning; if false, use unconditional model
  cath_code_level: "T"    # Guidance level
  len_cath_code_path: ${oc.env:DATA_PATH}/metric_factory/features/D_FS_afdb_cath_codes.pth

  # Guidance
  guidance_weight: 1.0   # guidance model weights, 1.0 for w/o CFG and autoguidance, 0.0 for excluding the main model. We typically set this value greater than 1

  # Autoguidance
  autoguidance_ratio: 1.0   # a value between 0 and 1, determining the proportion of autoguidance v.s. classifier-free guidance, 1.0 for all autoguidance, 0.0 for all CFG
  autoguidance_ckpt_path: null

  # LoRA -- if you use lora, set the same parameters as for training
  lora:
    use: false
    lora_alpha: 32.0
    lora_dropout: 0.0
    r: 16
    train_bias: "none"

  # Designability
  designability_seqs_per_struct: 8
  compute_designability: True

  # FID-related metrics
  compute_fid: False
