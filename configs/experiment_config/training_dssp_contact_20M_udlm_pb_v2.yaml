run_name_: dssp_contact_20M_udlm_pb_v2

# Initialize IPA from AF2 model 1 ptm at epoch 0
af2_ipa_weights_path: /home/ubuntu/params/params_model_1_ptm.npz
# Freeze pretrained IPA structure module weights; only train projection layers
freeze_ipa: true
# Fallback pretrain if IPA not found or for other layers
pretrain_ckpt_path: null

hardware:
  ncpus_per_task_train_: 16
  ncpus_per_task_prepro_: 16
  accelerator: gpu
  ngpus_per_node_: 4  # STAGE 2: 4-GPU setup. Effective batch = 4 * 4 micro * 1 accum = 16.
  nnodes_: 1

loss:
  t_distribution:
    name: uniform
    p1: 0.0
    p2: 1.0
  loss_t_clamp: 0.9
  use_aux_loss: True
  aux_loss_t_lim: 0.3
  thres_aux_2d_loss: 0.6
  aux_loss_weight: 1.0
  dssp_aux_loss_weight: 0.0
  # Distogram settings (AlphaFold format: 38 bins of 1.25Å width between 3.25-50.75Å + 1 overflow)
  # Must match num_buckets_predict_pair in nn config
  num_dist_buckets: 39  # 38 bins + 1 underflow bucket (distances < 3.25Å are rare for CA/CB)
  distogram_min_bin: 0.325  # 3.25Å in nm (first boundary)
  distogram_max_bin: 5.075  # 50.75Å in nm (last boundary, overflow bin for >= this)

defaults:
  - model: contactflow_discrete_uniform
  - override model/nn: contact_af3_20M_tri_individual-embed_coor_ipa-coord_dssp
  - _self_

model:
  dssp_diffusion:
    enabled: true
    type: udlm
    loss_weight: 1.0
    vocab_size: 3  # loop, helix, strand
    noise_schedule: cosine
    timesteps: 1000
    cont_time: true
    sampling_grid: cosine
    eps: 1e-4

  nn:
    multilabel_mode: sum # Note inherited from 190828
    # CATH lists each structural domain as a separate entry (e.g., 1n7d_A has 5 LA
    # domains all classified as 4.10.400.10). With cath_dedupe_codes: True we
    # collapse repeated (C, A, T) triples per chain so each unique fold contributes
    # once to the sum. See also `validation_sampling.cath` plumbing.
    cath_dedupe_codes: True
    residue_type_emb_init_seq: True
    residue_type_emb_cond_seq: True
    residue_type_emb_init_pair: True
    residue_type_emb_cond_pair: True
    seq_emb_dim: 2
    predict_dssp: true
    dssp_diffusion_mode: true # For transformer native embedding
    ext_lig_emb_init_seq: True
    ext_lig_emb_cond_seq: True
    ext_lig_emb_dim: 3

# Dataset: PDB only (purge-test, no mixed d_FS).
# v2 vs v1: ConFind-derived contacts at threshold 0.01 (rotamer-based, more physical)
# instead of CB-distance-10Å contacts (v1). Max length 256 unchanged. The
# ContactMapTransform reads precomputed `contact_map_confind` from .pt files and
# binarizes at the threshold declared in the dataset YAML.
dataset: pdb_train_contact-confind_S25_max256_purge-test_cutoff-190828
dataset_config_subdir: pdb

# Load processed .pt files into RAM at training start (policy switch 2026-05-26).
# Overrides datamodule.in_memory in the dataset YAML.
datamodule:
  in_memory: True

force_precision_f32: False

training:
  self_cond: True
  seq_cond: True
  fold_cond: True
  # Enable UDLM position bias for wavefront curriculum
  position_bias:
    enabled: true
    mode: sigmoid
    k: 10.0
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.67, 0.13, 0.2, 0.0]
  mask_seq_proportion: 0.15
  mask_extlig_proportion: 0.3
  finetune_seq_cond_lora_only: False
  self_cond_use_copy: True
  self_cond_copy_update_every: 10
  self_cond_mode: alias   # Phase 5 default: shared params (1x memory, live SC weights, full compile speedup). Alternatives: 'deepcopy' (separate weights, periodic resync) or 'none' (SC/training share self.nn; requires Phase 4 fix; may thrash compile cache).
  zero_sin_pos_emb: True

lora:
  use: False
  lora_alpha: 32.0
  lora_dropout: 0.0
  r: 0
  train_bias: none

opt:
  lr: 0.0001
  # STAGE 2: finetune from Stage-1 best ckpt. Targets 80K optim steps (~1.3M
  # samples at effective batch 16). max_epochs is a loose upper-bound; max_steps
  # is the hard stop.
  max_epochs: 200
  max_steps: 80000
  batch_size: 4  # per-GPU micro-batch
  accumulate_grad_batches: 1  # effective = 4 GPU * 4 micro * 1 accum = 16
  optimizer: muon
  val_check_interval_optim_steps: 100  # counted in optim steps (= 100 * 1 = 100 minibatches per GPU); DDP-safe.
  skip_nan_grad: False
  # Set True to print ipa_linear_s/z grad norms + frames_pred stats every 100
  # train steps. For the FAPE/IPA debug experiments only — keep False in prod.
  debug_log_grads: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  # NCCL: required for the new distributed val-trajectory path —
  # `_run_validation_trajectory` runs `generate(nsamples=tmscore_n_samples //
  # world_size)` on every rank and accumulates per-rank TM-scores; gloo's
  # 30-min recv timeout was too short for the rank-0-only legacy path and
  # blocked stage-1 entirely. See plan H2.
  dist_backend: nccl
  use_lr_warmup: True
  warmup_steps: 3000
  warmup_start_lr_ratio: 0.0
  lr_scheduler_type: cosine
  use_cueq: False

log:
  wandb_project: protein_transformer_big_runs
  log_wandb: True
  log_every_n_steps: 1
  log_structure_every_n_steps: 100
  checkpoint: True
  last_ckpt_every_n_steps: 2000
  # Save an additional best-of-run checkpoint based on validation_sampling/tmscore_median
  # (higher = better). save_top_k=1 keeps just the best one and removes worse ones.
  # Set False to disable.
  checkpoint_best_tmscore_median: True

validation_sampling:
  dt: 0.005
  sampling_mode: sc
  sc_scale_noise: 0.45
  # NOTE: tmscore_n_samples counts BATCHES (not samples). 8 batches of val_batch_size
  # = 4 samples each → 32 samples in the concatenated val trajectory. Each chunk
  # then runs at training-batch memory (see tmscore_traj_chunk_size).
  tmscore_n_samples: 8
  tmscore_every_n_val_epochs: 1
  tmscore_mode: 5
  # Cap the per-trajectory NN forward at training-batch memory. Defaults to
  # opt.batch_size when omitted. With tmscore_n_samples=8 and batch_size=4, this
  # turns one B=32 trajectory call into 8 successive B=4 calls — each call's
  # memory profile matches a training mini-batch.
  tmscore_traj_chunk_size: 4
  # Prediction-eval semantics: use each val sample's real length (from its own mask),
  # not a random L drawn from dataselector bounds. Default would auto-enable when
  # dataselector exposes min/max length, which is wrong for prediction eval — and
  # changing L per val epoch also triggers torch._dynamo recompiles.
  variable_length_sampling: False

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False

# ==============================================================================
# Inference Configuration Section
# Used when calling inference scripts (inference.py / motif_inference.py)
# directly with this unified config file.
# Stage-2 inference mirrors training: seq_cond=True, zero_sin_pos_emb=True.
# ==============================================================================
inference:
  # 'best' resolves the run's best TM-score ckpt from
  # ./store/{run_name_}/checkpoints/ (writer is log.checkpoint_best_tmscore_median).
  # 'last' resolves the most-recent checkpoint instead.
  checkpoint_mode: "best"
  # Backward-compatibility explicit path (overrides checkpoint_mode if set).
  ckpt_path: null
  ckpt_name: null

  ncpus_: 24
  seed: 42

  # Lengths to sample (uses nres_lens if set, else arange(min_len, max_len+1, step))
  nres_lens: [50, 100, 150, 200, 250]
  min_len: null
  max_len: null
  step_len: null

  nsamples_per_len: 1024
  max_nsamples: 32

  # Sampling
  dt: 0.005
  self_cond: True
  fold_cond: False
  cath_code_level: "T"
  seq_cond: True
  zero_sin_pos_emb: True

  data_dir: ${oc.env:DATA_PATH}/pdb_train/
  cath_code_file: cath_codes_train_df_pdb_f1_minl50_maxl256_mtprotein_etdiffractionEM_minoNone_maxoNone_minr0.0_maxr5.0_hl_rl_rnsrTrue_rpuTrue_l_rcuFalse.csv

  # ext_lig default for inference: "unknown" (2, AFDB-style) or "absent" (0, apo).
  ext_lig_default: "unknown"

  # Sampling params for the caflow/contactflow sampler used by this model class
  sampling_caflow:
    sampling_mode: sc
    sc_scale_noise: 0.45
    sc_scale_score: 1.0
    gt_mode: "1/t"
    gt_p: 1.0
    gt_clamp_val: null

  schedule:
    schedule_mode: log
    schedule_p: 2.0

  # LoRA — mirror training if you use lora
  lora:
    use: False
    lora_alpha: 32.0
    lora_dropout: 0.0
    r: 0
    train_bias: "none"

  designability_seqs_per_struct: 8
  compute_designability: False
  compute_fid: False
